services:
  backend:
    build:
      context: ../mercapleno-backend
      dockerfile: Dockerfile.dev
    env_file:
      - ../mercapleno-backend/.env.docker
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "4000:4000"

  frontend:
    build:
      context: ../Propio
      dockerfile: Dockerfile.dev
    depends_on:
      - backend
    ports:
      - "5173:5173"
